<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallout 1 AAF Font Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <header>
            <h1>Fallout 1 AAF Font Editor</h1>
            <div id="controls">
                <input type="file" id="file-input" accept=".aaf">
                <button id="download-btn">Save .aaf</button>
            </div>
            <div id="instructions">
                Upload a valid AAF font file to edit.
            </div>
        </header>

        <main>
            <div id="sidebar">
                <h2>Glyphs</h2>
                <div id="glyph-list"></div>
            </div>

            <div id="editor-area">
                <div id="editor-header">
                    <h2 id="current-glyph-info">Select a glyph</h2>
                    <div id="dimensions">
                        <label>W: <input type="number" id="glyph-width" min="0" max="255"></label>
                        <label>H: <input type="number" id="glyph-height" min="0" max="255"></label>
                    </div>
                </div>

                <div id="canvas-container">
                    <canvas id="glyph-canvas"></canvas>
                </div>

                <div id="palette-container">
                    <h3>Brightness Palette (0-9)</h3>
                    <div id="palette">
                        <!-- Palette items will be generated by JS -->
                    </div>
                    <div id="current-color-display">Current Color: <span id="current-color-val">9</span></div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
